# GitHub Actions CI template

GitHub App permissions for this integration cannot create `.github/workflows/*` directly.

**To enable CI:**
1. In the repo, create `.github/workflows/ci.yml`
2. Paste the contents of `docs/ci-template.yml`
3. Commit on `main`

---

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f app/requirements.txt ]; then pip install -r app/requirements.txt; fi
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install ruff || true

      - name: Lint (non-blocking starter)
        run: |
          ruff check . || true

      - name: Syntax check Python files
        run: |
          python - <<'PY'
          import compileall, sys
          ok = compileall.compile_dir(".", quiet=1, force=True)
          sys.exit(0 if ok else 1)
          PY
